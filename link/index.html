<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sb Marketing | Links</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="../images/sb-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #041020;
      --yellow:  #FFE500;
      --white:   #ffffff;
      --bg:      #f0f1f3;
      --card:    #ffffff;
      --muted:   #6b7280;
      --btn-hover: #0d2242;
      --wa-green: #25D366;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem 1rem;
      background: radial-gradient(ellipse at 60% 0%, rgba(4,16,32,0.06) 0%, transparent 70%),
                  radial-gradient(ellipse at 20% 100%, rgba(255,229,0,0.07) 0%, transparent 60%),
                  var(--bg);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 28px;
      box-shadow:
        0 4px 6px rgba(4,16,32,0.04),
        0 10px 40px rgba(4,16,32,0.10),
        0 1px 2px rgba(4,16,32,0.06);
      padding: 2.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.55s cubic-bezier(.22,.68,0,1.2) 0.1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 1.1rem;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--dark) 100%);
      z-index: 0;
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 22px;
      object-fit: cover;
      border: 3px solid var(--white);
      display: block;
    }

    /* ── Identity ── */
    .username {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--dark);
      margin-bottom: 0.35rem;
    }

    .tagline {
      font-size: 0.83rem;
      font-weight: 400;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      max-width: 260px;
      margin-bottom: 1.8rem;
    }

    /* ── Buttons ── */
    .btn-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-bottom: 1.6rem;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 62px;
      padding: 0 1.25rem;
      border-radius: 18px;
      background: var(--dark);
      color: var(--white);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      border: none;
      cursor: pointer;
      overflow: hidden;
      transition:
        transform 0.18s cubic-bezier(.22,.68,0,1.3),
        background 0.18s ease,
        box-shadow 0.18s ease;
      box-shadow: 0 2px 10px rgba(4,16,32,0.18);
      opacity: 0;
      animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.2) forwards;
    }

    /* staggered entrance */
    .btn:nth-child(1) { animation-delay: 0.25s; }
    .btn:nth-child(2) { animation-delay: 0.33s; }
    .btn:nth-child(3) { animation-delay: 0.41s; }
    .btn:nth-child(4) { animation-delay: 0.49s; }
    .btn:nth-child(5) { animation-delay: 0.57s; }
    .btn:nth-child(6) { animation-delay: 0.65s; }

    /* yellow left accent bar */
    .btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--yellow);
      border-radius: 18px 0 0 18px;
      transform: scaleY(0);
      transition: transform 0.2s cubic-bezier(.22,.68,0,1.3);
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: scale(1.025) translateY(-1px);
      box-shadow: 0 6px 24px rgba(4,16,32,0.22);
    }

    .btn:hover::before {
      transform: scaleY(1);
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* ── Primary button (Pack Présence Digitale) ── */
    .btn-primary {
      background: var(--yellow);
      color: var(--dark);
      box-shadow: 0 2px 16px rgba(255,229,0,0.35);
      font-size: 0.97rem;
      font-weight: 700;
    }

    .btn-primary::before {
      background: var(--dark);
    }

    .btn-primary:hover {
      background: #f0d800;
      box-shadow: 0 6px 28px rgba(255,229,0,0.45);
    }

    .btn-primary .btn-arrow {
      color: var(--dark);
      opacity: 0.5;
    }

    /* arrow icon on right */
    .btn-arrow {
      position: absolute;
      right: 1.1rem;
      opacity: 0.35;
      font-size: 0.75rem;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .btn:hover .btn-arrow {
      opacity: 0.8;
      transform: translateX(2px);
    }

    /* ── WhatsApp icon left ── */
    .btn-icon {
      position: absolute;
      left: 1.1rem;
      display: flex;
      align-items: center;
      opacity: 0.7;
      transition: opacity 0.18s ease;
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .btn:hover .btn-icon {
      opacity: 1;
    }

    /* ── Social icons row ── */
    .socials {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.4rem;
    }

    .social-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(4,16,32,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--dark);
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .social-btn:hover {
      background: var(--dark);
      color: var(--white);
      transform: translateY(-2px);
    }

    .social-btn svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* ── Responsive ── */
    @media (max-width: 440px) {
      .card { padding: 2rem 1.4rem 1.6rem; border-radius: 22px; }
      .btn  { height: 58px; }
    }
  </style>
</head>
