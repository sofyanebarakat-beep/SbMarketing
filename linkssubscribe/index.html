<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sb Marketing | Merci !</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="../images/sb-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      background-image: linear-gradient(-45deg, #f0f1f3, #eceef5, #f5f1e8, #f0f1f3);
      background-size: 400% 400%;
      animation: grad 18s ease infinite;
      -webkit-font-smoothing: antialiased;
      color: #041020;
    }

    @keyframes grad { 0%,100%{background-position:0 50%} 50%{background-position:100% 50%} }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes checkDraw {
      from { stroke-dashoffset: 60; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes circleDraw {
      from { stroke-dashoffset: 160; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes popIn {
      0%   { transform: scale(.6); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    .card {
      width: 100%; max-width: 400px;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 4px 6px rgba(4,16,32,.04), 0 12px 40px rgba(4,16,32,.10);
      padding: 2.8rem 2rem 2.4rem;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      opacity: 0; transform: translateY(18px);
      animation: fadeUp .55s cubic-bezier(.22,.68,0,1.2) .1s forwards;
    }

    /* ── Success icon ── */
    .success-icon {
      width: 72px; height: 72px; margin-bottom: 1.5rem;
      animation: popIn .5s cubic-bezier(.22,.68,0,1.3) .35s both;
    }

    .success-circle {
      fill: none; stroke: #fabb32; stroke-width: 4;
      stroke-dasharray: 160; stroke-dashoffset: 160;
      animation: circleDraw .5s ease .35s forwards;
    }

    .success-check {
      fill: none; stroke: #fabb32; stroke-width: 4;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 60; stroke-dashoffset: 60;
      animation: checkDraw .35s ease .75s forwards;
    }

    /* ── Logo ── */
    .logo {
      width: 48px; height: 48px; border-radius: 12px;
      object-fit: cover; margin-bottom: 1rem;
      border: 2px solid rgba(250,187,50,.3);
      opacity: 0; animation: fadeUp .4s ease .2s forwards;
    }

    /* ── Text ── */
    .headline {
      font-size: 1.45rem; font-weight: 800; letter-spacing: -.02em;
      color: #041020; margin-bottom: .5rem;
      opacity: 0; animation: fadeUp .4s ease .55s forwards;
    }

    .subline {
      font-size: .88rem; color: #6b7280; line-height: 1.6;
      max-width: 270px; margin-bottom: 1.8rem;
      opacity: 0; animation: fadeUp .4s ease .65s forwards;
    }

    .subline strong { color: #041020; font-weight: 600; }

    /* ── Divider ── */
    .divider {
      width: 36px; height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, transparent, rgba(250,187,50,.5), transparent);
      margin-bottom: 1.8rem;
      opacity: 0; animation: fadeUp .4s ease .7s forwards;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex; flex-direction: column; gap: .6rem; width: 100%;
      opacity: 0; animation: fadeUp .4s ease .8s forwards;
    }

    .btn {
      display: flex; align-items: center; justify-content: center;
      height: 54px; border-radius: 16px; font-size: .9rem; font-weight: 600;
      text-decoration: none; transition: transform .18s, background .18s, box-shadow .18s;
      font-family: inherit;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: #041020; color: #ffffff;
      box-shadow: 0 2px 10px rgba(4,16,32,.18);
    }
    .btn-primary:hover { background: #0d2242; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(4,16,32,.22); }

    .btn-secondary {
      background: rgba(250,187,50,.12); color: #c48800;
      border: 1.5px solid rgba(250,187,50,.3);
    }
    .btn-secondary:hover { background: rgba(250,187,50,.2); transform: translateY(-1px); }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 1.6rem; font-size: .72rem; color: #9ca3af;
      opacity: 0; animation: fadeUp .4s ease .95s forwards;
    }

    @media (max-width: 440px) {
      .card { padding: 2.2rem 1.4rem 2rem; border-radius: 22px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <img src="../images/sb-logo.svg" alt="Sb Marketing" class="logo">

    <svg class="success-icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle class="success-circle" cx="36" cy="36" r="32"/>
      <polyline class="success-check" points="22,37 31,46 50,27"/>
    </svg>

    <h1 class="headline">Merci pour votre intérêt !</h1>
    <p class="subline">
      Notre offre arrive dans votre boîte mail.<br>
      <strong>L'équipe Sb Marketing</strong> vous recontacte très bientôt.
    </p>

    <div class="divider"></div>

    <div class="btn-group">
      <a href="https://www.sbmarketing.fr/" class="btn btn-primary" target="_blank" rel="noopener">
        Visiter le site →
      </a>
      <a href="../link/" class="btn btn-secondary">
        ← Retour aux liens
      </a>
    </div>

    <p class="footer-note">Sb Marketing · Nice, Côte d'Azur</p>

  </div>

</body>
</html>
