<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#1a3260"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8a820"/>
      <stop offset="100%" stop-color="#fabb32"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="810" fill="url(#bg)"/>

  <!-- Decorative corner shapes -->
  <polygon points="1440,0 1440,320 1200,0" fill="#ffffff" opacity="0.03"/>
  <polygon points="0,810 280,810 0,560" fill="#ffffff" opacity="0.03"/>

  <!-- Accent bar -->
  <rect x="160" y="340" width="60" height="8" fill="url(#accent)" rx="4"/>

  <!-- MK -->
  <text
    x="160"
    y="440"
    font-family="'Arial Black','Franklin Gothic Heavy',Arial,sans-serif"
    font-size="160"
    font-weight="900"
    fill="#ffffff"
    text-anchor="start"
    letter-spacing="-4">MK</text>

  <!-- MULTISERVICES -->
  <text
    x="160"
    y="510"
    font-family="'Arial Black','Franklin Gothic Heavy',Arial,sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#accent)"
    text-anchor="start"
    letter-spacing="6">MULTISERVICES</text>

  <!-- Tagline -->
  <text
    x="160"
    y="560"
    font-family="Arial,sans-serif"
    font-size="26"
    font-weight="400"
    fill="rgba(255,255,255,0.45)"
    text-anchor="start"
    letter-spacing="1">Administratif · Diagnostics auto · Clés · Nice</text>
</svg>
