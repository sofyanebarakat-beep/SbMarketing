<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810">
  <defs>
    <radialGradient id="bg-center" cx="55%" cy="50%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e85000"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </radialGradient>
    <radialGradient id="bg-tl" cx="0%" cy="0%" r="70%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-br" cx="100%" cy="100%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base orange -->
  <rect width="1440" height="810" fill="#ff6200"/>
  <!-- Center darker -->
  <rect width="1440" height="810" fill="url(#bg-center)"/>
  <!-- Top-left warm highlight -->
  <rect width="1440" height="810" fill="url(#bg-tl)"/>
  <!-- Bottom-right warmth -->
  <rect width="1440" height="810" fill="url(#bg-br)"/>

  <!-- MK MULTI SERVICES centered -->
  <text
    x="720"
    y="432"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',Arial,sans-serif"
    font-size="110"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="6">MK MULTI SERVICES</text>
</svg>
