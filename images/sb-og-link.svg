<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020c18"/>
      <stop offset="100%" stop-color="#061a32"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fabb32"/>
      <stop offset="100%" stop-color="#e8a820"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fabb32" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#fabb32" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Gold accent bar left -->
  <rect x="80" y="200" width="5" height="220" fill="url(#gold)" rx="3"/>

  <!-- Gold accent top line -->
  <rect x="80" y="190" width="120" height="4" fill="url(#gold)" rx="2"/>

  <!-- "Sb Marketing" -->
  <text
    x="108"
    y="310"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-2">Sb Marketing</text>

  <!-- Tagline -->
  <text
    x="108"
    y="368"
    font-family="Arial, sans-serif"
    font-size="28"
    font-weight="400"
    fill="rgba(255,255,255,0.52)"
    letter-spacing="0.5">On fait croître votre business en ligne</text>

  <!-- Divider -->
  <rect x="108" y="405" width="560" height="1.5" fill="rgba(255,255,255,0.08)" rx="1"/>

  <!-- Services pills -->
  <rect x="108" y="428" width="140" height="36" rx="18" fill="rgba(250,187,50,0.12)" stroke="#fabb32" stroke-opacity="0.3" stroke-width="1"/>
  <text x="178" y="451" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#fabb32" text-anchor="middle">Sites Web</text>

  <rect x="262" y="428" width="160" height="36" rx="18" fill="rgba(250,187,50,0.12)" stroke="#fabb32" stroke-opacity="0.3" stroke-width="1"/>
  <text x="342" y="451" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#fabb32" text-anchor="middle">Meta &amp; Google Ads</text>

  <rect x="436" y="428" width="130" height="36" rx="18" fill="rgba(250,187,50,0.12)" stroke="#fabb32" stroke-opacity="0.3" stroke-width="1"/>
  <text x="501" y="451" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#fabb32" text-anchor="middle">Social Media</text>

  <!-- URL bottom left -->
  <text
    x="108"
    y="560"
    font-family="Arial, sans-serif"
    font-size="20"
    font-weight="600"
    fill="rgba(255,255,255,0.3)"
    letter-spacing="1">sbmarketing.fr</text>

  <!-- Right side decorative circle -->
  <circle cx="980" cy="315" r="180" fill="none" stroke="#fabb32" stroke-opacity="0.05" stroke-width="60"/>
  <circle cx="980" cy="315" r="110" fill="none" stroke="#fabb32" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Right side "→" arrow -->
  <text x="980" y="338" font-family="Arial, sans-serif" font-size="88" fill="rgba(250,187,50,0.18)" text-anchor="middle">→</text>
</svg>
