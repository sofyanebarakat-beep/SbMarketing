<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810">
  <rect width="1440" height="810" fill="#000000"/>

  <g transform="translate(720,400) scale(1.15)">
    <!-- Outline/shadow layer (dark blue, offset) -->
    <g transform="translate(4,4)" opacity="0.7">
      <!-- Left horn -->
      <path d="M -45,-20 C -70,-45 -105,-75 -135,-90 C -158,-100 -175,-98 -178,-85 C -181,-70 -168,-52 -148,-40 C -130,-29 -108,-22 -88,-16 L -62,65 L -30,-10 Z" fill="#1a237e"/>
      <!-- Right horn -->
      <path d="M 45,-20 C 70,-45 105,-75 135,-90 C 158,-100 175,-98 178,-85 C 181,-70 168,-52 148,-40 C 130,-29 108,-22 88,-16 L 62,65 L 30,-10 Z" fill="#1a237e"/>
      <!-- W center -->
      <path d="M -30,-10 L -62,65 L 0,72 L 62,65 L 30,-10 L 0,35 Z" fill="#1a237e"/>
    </g>

    <!-- White highlight layer (offset opposite) -->
    <g transform="translate(-3,-3)" opacity="0.85">
      <!-- Left horn -->
      <path d="M -45,-20 C -70,-45 -105,-75 -135,-90 C -158,-100 -175,-98 -178,-85 C -181,-70 -168,-52 -148,-40 C -130,-29 -108,-22 -88,-16 L -62,65 L -30,-10 Z" fill="#ffffff"/>
      <!-- Right horn -->
      <path d="M 45,-20 C 70,-45 105,-75 135,-90 C 158,-100 175,-98 178,-85 C 181,-70 168,-52 148,-40 C 130,-29 108,-22 88,-16 L 62,65 L 30,-10 Z" fill="#ffffff"/>
      <!-- W center -->
      <path d="M -30,-10 L -62,65 L 0,72 L 62,65 L 30,-10 L 0,35 Z" fill="#ffffff"/>
    </g>

    <!-- Main red layer -->
    <!-- Left horn -->
    <path d="M -45,-20 C -70,-45 -105,-75 -135,-90 C -158,-100 -175,-98 -178,-85 C -181,-70 -168,-52 -148,-40 C -130,-29 -108,-22 -88,-16 L -62,65 L -30,-10 Z" fill="#cc0a0a"/>
    <!-- Right horn (mirror) -->
    <path d="M 45,-20 C 70,-45 105,-75 135,-90 C 158,-100 175,-98 178,-85 C 181,-70 168,-52 148,-40 C 130,-29 108,-22 88,-16 L 62,65 L 30,-10 Z" fill="#cc0a0a"/>
    <!-- W center fill -->
    <path d="M -30,-10 L -62,65 L 0,72 L 62,65 L 30,-10 L 0,35 Z" fill="#cc0a0a"/>

    <!-- Green heart at bottom -->
    <path d="M 0,78 C -12,68 -28,56 -28,42 C -28,32 -20,24 -10,24 C -5,24 0,28 0,28 C 0,28 5,24 10,24 C 20,24 28,32 28,42 C 28,56 12,68 0,78 Z" fill="#4caf50"/>
