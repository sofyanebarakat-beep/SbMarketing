<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" width="1440" height="810">
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background: dusty rose -->
  <rect width="1440" height="810" fill="#C4A4B2"/>

  <!-- G (back letter, offset right) -->
  <text
    x="780"
    y="540"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="430"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    filter="url(#soft-shadow)">G</text>

  <!-- A (front letter, offset up-left to overlap) -->
  <text
    x="670"
    y="500"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="390"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    filter="url(#soft-shadow)">A</text>
</svg>
