<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#041020"/>
  <!-- Gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#041020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#d4890a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="900" height="500" fill="url(#glow)"/>

  <!-- Grid lines -->
  <line x1="100" y1="80" x2="100" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="220" y1="80" x2="220" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="340" y1="80" x2="340" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="460" y1="80" x2="460" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="580" y1="80" x2="580" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="700" y1="80" x2="700" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="820" y1="80" x2="820" y2="380" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="120" x2="840" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="180" x2="840" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="240" x2="840" y2="240" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="300" x2="840" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="360" x2="840" y2="360" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Growth bars -->
  <rect x="110" y="300" width="60" height="80" rx="6" fill="url(#barGrad)" opacity="0.3"/>
  <rect x="230" y="260" width="60" height="120" rx="6" fill="url(#barGrad)" opacity="0.4"/>
  <rect x="350" y="220" width="60" height="160" rx="6" fill="url(#barGrad)" opacity="0.5"/>
  <rect x="470" y="180" width="60" height="200" rx="6" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="590" y="140" width="60" height="240" rx="6" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="710" y="100" width="60" height="280" rx="6" fill="url(#barGrad)"/>

  <!-- Trend line -->
  <polyline points="140,310 260,270 380,225 500,185 620,145 740,105" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots on line -->
  <circle cx="140" cy="310" r="5" fill="#f5a623"/>
  <circle cx="260" cy="270" r="5" fill="#f5a623"/>
  <circle cx="380" cy="225" r="5" fill="#f5a623"/>
  <circle cx="500" cy="185" r="5" fill="#f5a623"/>
  <circle cx="620" cy="145" r="5" fill="#f5a623"/>
  <circle cx="740" cy="105" r="8" fill="#f5a623"/>

  <!-- Tooltip at last point -->
  <rect x="680" y="60" width="130" height="36" rx="8" fill="#f5a623"/>
  <text x="745" y="82" text-anchor="middle" fill="#041020" font-weight="700" font-size="14">+340% croissance</text>
  <line x1="740" y1="96" x2="740" y2="105" stroke="#f5a623" stroke-width="2"/>

  <!-- Social media icons (simplified) -->
  <!-- Instagram -->
  <rect x="60" y="400" width="36" height="36" rx="10" fill="none" stroke="rgba(245,166,35,0.5)" stroke-width="1.5"/>
  <circle cx="78" cy="418" r="8" fill="none" stroke="rgba(245,166,35,0.5)" stroke-width="1.5"/>
  <circle cx="88" cy="410" r="2" fill="rgba(245,166,35,0.5)"/>
  <!-- Facebook -->
  <rect x="110" y="400" width="36" height="36" rx="10" fill="none" stroke="rgba(245,166,35,0.4)" stroke-width="1.5"/>
  <text x="128" y="423" text-anchor="middle" fill="rgba(245,166,35,0.5)" font-size="18" font-weight="700">f</text>
  <!-- LinkedIn -->
  <rect x="160" y="400" width="36" height="36" rx="10" fill="none" stroke="rgba(245,166,35,0.3)" stroke-width="1.5"/>
  <text x="178" y="423" text-anchor="middle" fill="rgba(245,166,35,0.3)" font-size="12" font-weight="700">in</text>

  <!-- Label -->
  <text x="60" y="470" fill="rgba(255,255,255,0.3)" font-size="12">Sb Marketing · Gestion des réseaux sociaux</text>
</svg>
