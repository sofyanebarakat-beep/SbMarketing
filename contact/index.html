<script>
window.addEventListener("DOMContentLoaded", (event) => {
  // Split text into spans
  let typeSplit;

  function runSplitType() {
    typeSplit = new SplitType("[text-split]", {
      types: "lines, words, chars",
      tagName: "span"
    });
  }

  runSplitType();

  // run the code when window width changes
  let windowWidth = window.innerWidth;
  window.addEventListener("resize", function () {
    if (windowWidth !== window.innerWidth) {
      windowWidth = window.innerWidth;
      typeSplit.revert();
      runSplitType();
    }
  });

  // Link timelines to scroll position
  function createScrollTrigger(triggerElement, timeline) {
    // Reset tl when scroll out of view past bottom of screen
    ScrollTrigger.create({
      trigger: triggerElement,
      start: "top bottom",
      onLeaveBack: () => {
        timeline.progress(0);
        timeline.pause();
      }
    });
    // Play tl when scrolled into view (60% from top of screen)
    ScrollTrigger.create({
      trigger: triggerElement,
      start: "top 60%",
      onEnter: () => timeline.play()
    });
  }

  $("[words-slide-up]").each(function (index) {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".word"), { opacity: 0, yPercent: 100, duration: 0.5, ease: "back.out(2)", stagger: { amount: 0.5 } });
    createScrollTrigger($(this), tl);
  });


  $("[words-slide-from-right]").each(function (index) {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".word"), { opacity: 0, x: "1em", duration: 0.6, ease: "power2.out", stagger: { amount: 0.2 } });
    createScrollTrigger($(this), tl);
  });

  $("[letters-slide-up]").each(function (index) {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), { yPercent: 100, duration: 0.4, ease: "power1.out", stagger: { amount: 0.5 } });
    createScrollTrigger($(this), tl);
  });

  $("[letters-slide-down]").each(function (index) {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), { yPercent: -120, duration: 0.3, ease: "power1.out", stagger: { amount: 0.7 } });
    createScrollTrigger($(this), tl);
  });

  $("[letters-fade-in]").each(function (index) {
    let tl = gsap.timeline({ paused: true });
    tl.from($(this).find(".char"), { opacity: 0, duration: 0.2, ease: "power1.out", stagger: { amount: 0.8 } });
    createScrollTrigger($(this), tl);
  });

  $("[scrub-each-word]").each(function (index) {
    let tl = gsap.timeline({
      scrollTrigger: {
        trigger: $(this),
        start: "top 80%",
        end: "bottom 40%",
        scrub: true
      }
    });
    tl.from($(this).find(".char"), { opacity: 0.2, duration: 0.2, ease: "power1.out", stagger: { each: 0.1 } });
  });

  // Avoid flash of unstyled content
  gsap.set("[text-split]", { opacity: 1 });
});


// hero header

// Function to trigger hero header animation
function triggerHeroHeaderAnimation() {
  // Ensure SplitType has run on the hero header
  let heroHeadingSplit = new SplitType('.hero_heading', {
    types: 'chars',
    tagName: 'span'
  });

  // Now, animate the split characters
  gsap.from(heroHeadingSplit.chars, {
    opacity: 0,
    yPercent: 100,
    duration: 0.8,
    stagger: {
      amount: 0.5
    },
    ease: "power3.out"
  });
}
// Function to trigger hero header animation
function triggerHeroHeaderAnimation() {
  // Assuming SplitType has already split the hero header
  // You don't need to initialize SplitType here again
  // Just animate the characters that were already split
  gsap.from(".hero_heading .char", {
    opacity: 0,
    yPercent: 100,
    duration: 0.8,
    stagger: {
      amount: 0.5
    },
    ease: "power3.out"
  });
}

// Page load animation
let homeLoadTl = gsap.timeline();

homeLoadTl
  .to(".loader_colums", {
    delay: 0.5,

      $(".loader_component").css("display", "none");

<script>
(function () {
  // Callouts slideshow
  var callouts = document.querySelectorAll('.callouts-wrapper');
  if (callouts.length) {
    var current = 0;
    callouts[current].classList.add('callout-active');
    setInterval(function () {
      callouts[current].classList.remove('callout-active');
      current = (current + 1) % callouts.length;
      callouts[current].classList.add('callout-active');
    }, 3000);
  }
})();

(function () {
  var navbar = document.querySelector('.navbar2_component');
  if (!navbar) return;
  function onScroll() {
    if (window.scrollY > 10) {
      navbar.classList.add('is-scrolled');
    } else {
      navbar.classList.remove('is-scrolled');
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
})();
</script>
