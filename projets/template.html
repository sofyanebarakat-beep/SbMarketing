  <script>
    (function () {
      var navbar = document.querySelector('.navbar2_component');
      if (!navbar) return;
      function onScroll() {
        if (window.scrollY > 10) {
          navbar.classList.add('is-scrolled');
        } else {
          navbar.classList.remove('is-scrolled');
        }
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
